# Sample message bundle for the Spring example.
# Only the codes used in this example are listed here.
# For codes not present, SpringMessageResolver falls back to MessageResolver.DEFAULT
# (built-in English messages). Add entries for any additional ErrorCodes you need,
# and create messages_<locale>.properties for locale-specific translations.
raoh.required=is required
raoh.too_short=must be at least {min} characters
raoh.too_long=must be at most {max} characters
raoh.invalid_format=invalid format
raoh.type_mismatch=expected {expected}
