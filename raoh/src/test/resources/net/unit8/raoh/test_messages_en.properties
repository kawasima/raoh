# Explicit English bundle.
# Required because on a JVM whose default locale is not English (e.g. ja_JP),
# Locale.ENGLISH resolves to this file instead of falling back to the base bundle
# through the system locale chain. Without this file the English test assertions
# would resolve Japanese messages on Japanese developer machines.
raoh.required=is required
raoh.too_short=must be at least {min} characters
raoh.out_of_range=must be between {min} and {max}
