# Base bundle (no locale suffix).
# Must exist so that ResourceBundle.getBundle() finds a bundle for locales that
# have no locale-specific file. Also serves as the fallback for locales other
# than English and Japanese used in tests.
raoh.required=is required
raoh.too_short=must be at least {min} characters
raoh.out_of_range=must be between {min} and {max}
